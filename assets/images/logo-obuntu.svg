<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 545" fill="none">
  <defs>
    <clipPath id="cc">
      <circle cx="340" cy="245" r="200"/>
    </clipPath>
  </defs>

  <rect width="580" height="545" fill="white"/>
  <circle cx="340" cy="245" r="200" fill="#0c2461"/>

  <!-- ══════════════════════════════════════════════
       BIRDS — white silhouettes
       Style: swift/seagull in banking flight
       Each: long swept-back left wing + shorter right + body + hanging tail
       Formation: diagonal upper-left → center-right, diminishing
       ══════════════════════════════════════════════ -->
  <g fill="white">

    <!-- Bird 1 (large) — body at (270, 143) -->
    <g transform="translate(270,143)">
      <!-- left wing: sweeps dramatically upper-left, thin crescent -->
      <path d="M0,0 C-10,-18 -34,-34 -55,-42 C-40,-26 -16,-8 0,0 Z"/>
      <!-- right wing: shorter, slightly downward -->
      <path d="M0,0 C10,-12 26,-14 38,-7 C24,-2 10,0 0,0 Z"/>
      <!-- body -->
      <ellipse cx="1" cy="2" rx="9" ry="5" transform="rotate(-15 1 2)"/>
      <!-- hanging tail / trailing legs -->
      <path d="M-1,5 C-3,14 -2,23 0,26 C2,23 3,14 1,5 Z"/>
    </g>

    <!-- Bird 2 (70%) — body at (313, 162) -->
    <g transform="translate(313,162) scale(0.70)">
      <path d="M0,0 C-10,-18 -34,-34 -55,-42 C-40,-26 -16,-8 0,0 Z"/>
      <path d="M0,0 C10,-12 26,-14 38,-7 C24,-2 10,0 0,0 Z"/>
      <ellipse cx="1" cy="2" rx="9" ry="5" transform="rotate(-15 1 2)"/>
      <path d="M-1,5 C-3,14 -2,23 0,26 C2,23 3,14 1,5 Z"/>
    </g>

    <!-- Bird 3 (50%) — body at (356, 179) -->
    <g transform="translate(356,179) scale(0.50)">
      <path d="M0,0 C-10,-18 -34,-34 -55,-42 C-40,-26 -16,-8 0,0 Z"/>
      <path d="M0,0 C10,-12 26,-14 38,-7 C24,-2 10,0 0,0 Z"/>
      <ellipse cx="1" cy="2" rx="9" ry="5" transform="rotate(-15 1 2)"/>
    </g>

    <!-- Bird 4 (35%) — body at (390, 195) -->
    <g transform="translate(390,195) scale(0.35)">
      <path d="M0,0 C-10,-18 -34,-34 -55,-42 C-40,-26 -16,-8 0,0 Z"/>
      <path d="M0,0 C10,-12 26,-14 38,-7 C24,-2 10,0 0,0 Z"/>
      <ellipse cx="1" cy="2" rx="9" ry="5" transform="rotate(-15 1 2)"/>
    </g>

  </g>

  <!-- ══════════════════════════════════════════════
       BARBED WIRE — 3 horizontal strands
       Barbs: asterisk / starburst shape (4 crossing lines)
       ══════════════════════════════════════════════ -->
  <g stroke="white" stroke-linecap="round" fill="none">

    <!-- ── Strand 1 (top) ── -->
    <line x1="288" y1="218" x2="516" y2="204" stroke-width="1.6"/>
    <g stroke-width="1.7">
      <g transform="translate(328,211)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(378,208)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(428,205)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(478,202)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
    </g>

    <!-- ── Strand 2 (middle) ── -->
    <line x1="278" y1="244" x2="516" y2="230" stroke-width="1.6"/>
    <g stroke-width="1.7">
      <g transform="translate(316,237)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(366,234)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(416,231)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(466,228)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
    </g>

    <!-- ── Strand 3 (bottom) ── -->
    <line x1="288" y1="268" x2="516" y2="254" stroke-width="1.6"/>
    <g stroke-width="1.7">
      <g transform="translate(328,261)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(378,258)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(428,255)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
      <g transform="translate(478,252)">
        <line x1="-9" y1="0" x2="9" y2="0"/>
        <line x1="0" y1="-9" x2="0" y2="9"/>
        <line x1="-6" y1="-6" x2="6" y2="6"/>
        <line x1="6" y1="-6" x2="-6" y2="6"/>
      </g>
    </g>

  </g>

  <!-- ══════════════════════════════════════════════
       OBUNTU — dual render (navy outside, white inside circle)
       Font: Trebuchet MS — rounded, closer to original
       ══════════════════════════════════════════════ -->
  <text x="6" y="296"
        font-family="'Trebuchet MS', 'Century Gothic', Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="2"
        fill="#0c2461">OBUNTU</text>
  <text x="6" y="296"
        font-family="'Trebuchet MS', 'Century Gothic', Arial, sans-serif"
        font-size="96" font-weight="700" letter-spacing="2"
        fill="white" clip-path="url(#cc)">OBUNTU</text>

  <!-- ══════════════════════════════════════════════
       SUBTITLE
       ══════════════════════════════════════════════ -->
  <text x="6" y="330"
        font-family="'Trebuchet MS', Arial, sans-serif"
        font-size="19" fill="#0c2461" letter-spacing="2">ENSINO • PESQUISA • EXTENSÃO</text>
</svg>
