<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 530" fill="none">
  <defs>
    <!-- clip to circle for white-text-inside effect -->
    <clipPath id="circleClip">
      <circle cx="335" cy="248" r="196"/>
    </clipPath>
  </defs>

  <!-- White background -->
  <rect width="560" height="530" fill="white"/>

  <!-- ── Navy blue circle ── -->
  <circle cx="335" cy="248" r="196" fill="#0c2461"/>

  <!-- ══════════════════════════════════
       BIRDS (garças) — white silhouettes
       ══════════════════════════════════ -->
  <g fill="white">

    <!-- Bird 1: large, upper-left of circle (main garça) -->
    <g transform="translate(208,112)">
      <!-- left wing upper surface -->
      <path d="M0,0 C-8,-6 -22,-3 -32,-1 C-22,-8 -8,-7 0,0"/>
      <!-- left wing lower surface (thin crescent) -->
      <path d="M0,0 C-8,-1 -22,3 -32,-1 C-22,0 -8,-2 0,0" opacity="0.7"/>
      <!-- right wing -->
      <path d="M4,-2 C12,-9 28,-10 36,-8 C28,-12 12,-10 4,-2"/>
      <!-- body -->
      <ellipse cx="2" cy="-1" rx="5" ry="3" transform="rotate(-8,2,-1)"/>
      <!-- neck curving forward-down -->
      <path d="M5,-3 C9,-6 12,-10 11,-14 C13,-14 15,-12 13,-9 C15,-9 17,-14 15,-16 L20,-17 C17,-14 14,-8 11,-6 C9,-3 6,-1 5,-3" fill="white"/>
    </g>

    <!-- Bird 2: medium, slightly lower-right -->
    <g transform="translate(270,150) scale(0.72)">
      <path d="M0,0 C-8,-6 -22,-3 -32,-1 C-22,-8 -8,-7 0,0"/>
      <path d="M4,-2 C12,-9 28,-10 36,-8 C28,-12 12,-10 4,-2"/>
      <ellipse cx="2" cy="-1" rx="5" ry="3" transform="rotate(-8,2,-1)"/>
      <path d="M5,-3 C9,-6 12,-10 11,-14 C13,-14 15,-12 13,-9 C15,-14 17,-16 20,-17 C17,-14 14,-8 11,-6 C9,-3 6,-1 5,-3" fill="white"/>
    </g>

    <!-- Bird 3: small -->
    <g transform="translate(316,170) scale(0.52)">
      <path d="M0,0 C-8,-6 -22,-3 -32,-1 C-22,-8 -8,-7 0,0"/>
      <path d="M4,-2 C12,-9 28,-10 36,-8 C28,-12 12,-10 4,-2"/>
      <ellipse cx="2" cy="-1" rx="5" ry="3" transform="rotate(-8,2,-1)"/>
      <path d="M5,-3 C8,-6 10,-9 9,-13 C11,-13 13,-11 12,-8 L15,-15 C13,-12 11,-7 9,-5 C7,-3 5,-1 5,-3" fill="white"/>
    </g>

    <!-- Bird 4: tiny -->
    <g transform="translate(353,186) scale(0.37)">
      <path d="M0,0 C-8,-6 -22,-3 -32,-1 C-22,-8 -8,-7 0,0"/>
      <path d="M4,-2 C12,-9 28,-10 36,-8 C28,-12 12,-10 4,-2"/>
      <ellipse cx="2" cy="-1" rx="5" ry="3" transform="rotate(-8,2,-1)"/>
    </g>
  </g>

  <!-- ══════════════════════════════════
       BARBED WIRE — 3 strands, white
       ══════════════════════════════════ -->
  <g stroke="white" stroke-linecap="round" fill="none">
    <!-- Strand 1 (top) -->
    <line x1="290" y1="218" x2="512" y2="203" stroke-width="1.6"/>
    <!-- barbs strand 1 -->
    <g stroke-width="1.4">
      <line x1="318" y1="212" x2="312" y2="223"/><line x1="324" y1="215" x2="318" y2="226"/>
      <line x1="358" y1="209" x2="352" y2="220"/><line x1="364" y1="212" x2="358" y2="223"/>
      <line x1="398" y1="206" x2="392" y2="217"/><line x1="404" y1="209" x2="398" y2="220"/>
      <line x1="438" y1="203" x2="432" y2="214"/><line x1="444" y1="206" x2="438" y2="217"/>
      <line x1="478" y1="200" x2="472" y2="211"/><line x1="484" y1="203" x2="478" y2="214"/>
    </g>

    <!-- Strand 2 (middle) -->
    <line x1="280" y1="244" x2="512" y2="229" stroke-width="1.6"/>
    <g stroke-width="1.4">
      <line x1="308" y1="238" x2="302" y2="249"/><line x1="314" y1="241" x2="308" y2="252"/>
      <line x1="348" y1="235" x2="342" y2="246"/><line x1="354" y1="238" x2="348" y2="249"/>
      <line x1="388" y1="232" x2="382" y2="243"/><line x1="394" y1="235" x2="388" y2="246"/>
      <line x1="428" y1="229" x2="422" y2="240"/><line x1="434" y1="232" x2="428" y2="243"/>
      <line x1="468" y1="226" x2="462" y2="237"/><line x1="474" y1="229" x2="468" y2="240"/>
    </g>

    <!-- Strand 3 (bottom) -->
    <line x1="290" y1="268" x2="512" y2="253" stroke-width="1.6"/>
    <g stroke-width="1.4">
      <line x1="318" y1="262" x2="312" y2="273"/><line x1="324" y1="265" x2="318" y2="276"/>
      <line x1="358" y1="259" x2="352" y2="270"/><line x1="364" y1="262" x2="358" y2="273"/>
      <line x1="398" y1="256" x2="392" y2="267"/><line x1="404" y1="259" x2="398" y2="270"/>
      <line x1="438" y1="253" x2="432" y2="264"/><line x1="444" y1="256" x2="438" y2="267"/>
      <line x1="478" y1="250" x2="472" y2="261"/><line x1="484" y1="253" x2="478" y2="264"/>
    </g>
  </g>

  <!-- ══════════════════════════════════
       OBUNTU — dual render:
       navy on white (outside circle)
       white on navy (inside circle)
       ══════════════════════════════════ -->

  <!-- Layer 1: dark navy (visible on white background) -->
  <text x="6" y="290"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="94" font-weight="900" letter-spacing="4"
        fill="#0c2461">OBUNTU</text>

  <!-- Layer 2: white — only visible where circle is underneath -->
  <text x="6" y="290"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="94" font-weight="900" letter-spacing="4"
        fill="white" clip-path="url(#circleClip)">OBUNTU</text>

  <!-- ══════════════════════════════════
       SUBTITLE
       ══════════════════════════════════ -->
  <text x="6" y="324"
        font-family="Arial, Helvetica, sans-serif"
        font-size="19.5" fill="#0c2461" letter-spacing="1.8">ENSINO • PESQUISA • EXTENSÃO</text>
</svg>
